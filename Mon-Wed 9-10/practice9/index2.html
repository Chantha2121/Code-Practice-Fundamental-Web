<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    .flex-container {
      display: flex;
      /* gap: 20px; */
      /* flex-direction: column-reverse; */
      /* flex-wrap: nowrap; */
      /* justify-content: space-between; */
      /* align-items: start; */

    }

    .item1,
    .item2,
    .item3 {
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      font-size: 30px;
    }

    .item1 {
      order: 3;
      flex-grow: 2;
      background-color: red;
    }

    .item2 {
      order: 2;
      flex-grow: 3;
      background-color: blue;
    }

    .item3 {
      flex-grow: 2;
      order: 1;
      background-color: green;
    }
  </style>
</head>

<body>
  <div class="flex-container">
    <div class="item1">1</div>
    <div class="item2">2</div>
    <div class="item3">3</div>
  </div>
</body>

</html>
