  <form id="form">
    <label for="first_name">First Name:</label>
    <input type="text" name="first_name" placeholder="Enter your first name"><br><br>
    <label for="last_name">Last Name:</label>
    <input type="text" id="last_name" name="last_name" placeholder="Enter your last name"><br><br>
    <input type="submit" value="Submit"><br>
    <label for="gender">Gender:</label>
    <input type="radio" id="male" name="gender" value="Male">
    <label for="male">Male</label>
    <input type="radio" id="female" name="gender" value="Female">
    <label for="female">Female</label>
    <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>

    <label for="cars">Choose Cars:</label>
    <select name="cars" id="cars">
      <option value="volvo">Volvo</option>
      <option value="saab" selected>Saab</option>
      <option value="mercedes">Mercedes</option>
      <option value="audi">Audi</option>
    </select>
  </form>
</body>

<script>
  document.getElementById("form").addEventListener("submit", function (event) {
    event.preventDefault(); // Prevent the default form submission

    const firstName = document.getElementById("first_name").value;
    const lastName = document.getElementById("last_name").value;

    alert(`Hello, ${firstName} ${lastName}!`);
    // Document Object Model (DOM) is a programming interface for web documents. It represents the page so that programs can change the document structure, style, and content. The DOM represents the document as nodes and objects; that way, programming languages can interact with the page. A web page is a document. This document can be either displayed in the browser window or as the HTML source. But it is the same document in both cases. The DOM provides a structured representation of the document as a tree, and it defines methods by which these nodes can be accessed and manipulated. With the DOM, programmers can create dynamic web pages that respond to user input and events.
  });
</script>
