<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

</head>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
  }

  .navbar {
    padding: 0px 32px;
    display: flex;
    justify-content: space-between;
    border: 1px solid #9549000F;
    max-height: 80px;
    align-items: center;
  }

  .menu-list ul {
    display: flex;
    gap: 41px;
    list-style: none;
    justify-content: center;
    align-items: center;

  }

  li a {
    font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
    text-decoration: none;
    color: #71717A;
    font-weight: 700;
    position: relative;
    display: inline-block;
    padding: 28px 0;
  }

  li a.active {
    color: #F4934D;
    font-weight: 700;
  }

  li a.active::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 20px;
    width: 100%;
    height: 2px;
    background: #F4934D;
    border-radius: 99px;
  }

  .button {
    padding: 8px 24px;
    background-color: #F4934D;
    font-weight: bold;
    border-radius: 12px;
    color: white;
  }

  .banner {
    width: 100%;
    height: 600px;
    background-image: url('./image/banner.png');
    background-size: cover;
    background-position: center;
  }

  .draw-section {
    display: flex;
    gap: 60px;
    padding: 80px 32px;
    align-items: center;
  }

  .draw-section .text h1 {
    font-size: 48px;
    font-weight: 700;
    color: #1B1B1B;
    line-height: 48px;
  }

  .draw-section .text p {
    font-size: 18px;
    color: #554338;
    margin-top: 16px;
    line-height: 29px;
  }

  .btn-draw {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 32px;
    padding: 16px 32px;
    background-color: #785900;
    font-size: 16px;
    border-radius: 9999px;
    color: white;
  }
</style>

<body>
  <div class="navbar">
    <div class="logo">
      <img src="./image/logo.png" alt="Logo">
    </div>

    <div class="menu-list">
      <ul>
        <li><a class="active" href="#">Home</a></li>
        <li><a href="#">Story Book</a></li>
        <li><a href="#">Drawing Book</a></li>
        <li><a href="#">Test</a></li>
      </ul>
    </div>

    <div class="button">
      My Library
    </div>
  </div>
  <div class="banner"></div>

  <div class="draw-section">
    <div class="image">
      <img src="./image/card.png" alt="">
    </div>
    <div class="text">
      <h1>Discover Drawing Book</h1>
      <p>Step into our curated atelier. Our 'Drawing Book' series guides
        children through foundational techniques using organic brushes
        and vibrant palettes that mimic real-world mediums.</p>

      <div class="btn-draw">Open Drawing Book <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
          xmlns="http://www.w3.org/2000/svg">
          <path d="M12.175 9H0V7H12.175L6.575 1.4L8 0L16 8L8 16L6.575 14.6L12.175 9Z" fill="white" />
        </svg>
      </div>
    </div>
  </div>
</body>

</html>
